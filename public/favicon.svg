<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="quantumGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="250" fill="#0f0f1a"/>
  
  <!-- Outer orbit -->
  <ellipse cx="256" cy="256" rx="200" ry="80" fill="none" stroke="url(#quantumGradient)" stroke-width="3" opacity="0.6">
    <animateTransform attributeName="transform" type="rotate" from="0 256 256" to="360 256 256" dur="20s" repeatCount="indefinite"/>
  </ellipse>
  
  <!-- Middle orbit -->
  <ellipse cx="256" cy="256" rx="200" ry="80" fill="none" stroke="url(#quantumGradient)" stroke-width="3" opacity="0.6" transform="rotate(60 256 256)">
    <animateTransform attributeName="transform" type="rotate" from="60 256 256" to="420 256 256" dur="15s" repeatCount="indefinite"/>
  </ellipse>
  
  <!-- Inner orbit -->
  <ellipse cx="256" cy="256" rx="200" ry="80" fill="none" stroke="url(#quantumGradient)" stroke-width="3" opacity="0.6" transform="rotate(120 256 256)">
    <animateTransform attributeName="transform" type="rotate" from="120 256 256" to="480 256 256" dur="10s" repeatCount="indefinite"/>
  </ellipse>
  
  <!-- Nucleus/core -->
  <circle cx="256" cy="256" r="40" fill="url(#quantumGradient)">
    <animate attributeName="r" values="38;42;38" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Glow effect -->
  <circle cx="256" cy="256" r="60" fill="url(#glowGradient)" opacity="0.4">
    <animate attributeName="opacity" values="0.3;0.5;0.3" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Electrons -->
  <circle cx="456" cy="256" r="8" fill="#ffffff">
    <animateTransform attributeName="transform" type="rotate" from="0 256 256" to="360 256 256" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Text/Initial -->
  <text x="256" y="266" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#ffffff" text-anchor="middle" opacity="0.9">QH</text>
</svg>
